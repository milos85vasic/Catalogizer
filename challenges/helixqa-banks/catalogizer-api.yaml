name: "Catalogizer API Test Suite"
description: "Comprehensive API testing for catalog-api service"
version: "1.0.0"
platforms:
  - api

tests:
  - id: "api-health-check"
    name: "Health Check"
    description: "Verify API health endpoint responds"
    platform: api
    priority: critical
    steps:
      - action: http_get
        target: "${API_URL:-http://localhost:8080}/api/v1/health"
        assertions:
          - status_code: 200
          - response_time_ms: < 1000
          - json_path: "$.status"
            expected: "healthy"

  - id: "api-auth-login"
    name: "Authentication Login"
    description: "Test login endpoint"
    platform: api
    priority: critical
    steps:
      - action: http_post
        target: "${API_URL:-http://localhost:8080}/api/v1/auth/login"
        body:
          username: "admin"
          password: "${ADMIN_PASSWORD:-admin123}"
        assertions:
          - status_code: 200
          - json_path: "$.token"
            not_empty: true
        save_response:
          token: "$.token"

  - id: "api-auth-protected"
    name: "Protected Endpoint Access"
    description: "Verify JWT authentication"
    platform: api
    priority: critical
    steps:
      - action: http_get
        target: "${API_URL:-http://localhost:8080}/api/v1/auth/me"
        headers:
          Authorization: "Bearer ${token}"
        assertions:
          - status_code: 200
          - json_path: "$.username"
            expected: "admin"

  - id: "api-storage-roots"
    name: "Storage Roots CRUD"
    description: "Test storage roots management"
    platform: api
    priority: high
    steps:
      - action: http_get
        target: "${API_URL:-http://localhost:8080}/api/v1/storage-roots"
        headers:
          Authorization: "Bearer ${token}"
        assertions:
          - status_code: 200
          - json_path: "$.roots"
            type: array

  - id: "api-entities-list"
    name: "Entity Listing"
    description: "Test entity browsing endpoint"
    platform: api
    priority: high
    steps:
      - action: http_get
        target: "${API_URL:-http://localhost:8080}/api/v1/entities"
        headers:
          Authorization: "Bearer ${token}"
        assertions:
          - status_code: 200
          - json_path: "$.entities"
            type: array
          - json_path: "$.total"
            type: number

  - id: "api-entities-search"
    name: "Entity Search"
    description: "Test entity search functionality"
    platform: api
    priority: high
    steps:
      - action: http_get
        target: "${API_URL:-http://localhost:8080}/api/v1/entities/search?q=test"
        headers:
          Authorization: "Bearer ${token}"
        assertions:
          - status_code: 200
          - response_time_ms: < 2000

  - id: "api-collections-list"
    name: "Collections List"
    description: "Test collections endpoint"
    platform: api
    priority: medium
    steps:
      - action: http_get
        target: "${API_URL:-http://localhost:8080}/api/v1/collections"
        headers:
          Authorization: "Bearer ${token}"
        assertions:
          - status_code: 200

  - id: "api-websocket-connect"
    name: "WebSocket Connection"
    description: "Verify WebSocket endpoint accepts connections"
    platform: api
    priority: high
    steps:
      - action: websocket_connect
        target: "ws://localhost:8080/ws"
        assertions:
          - connected: true
          - connection_time_ms: < 1000

  - id: "api-metrics"
    name: "Prometheus Metrics"
    description: "Verify metrics endpoint"
    platform: api
    priority: medium
    steps:
      - action: http_get
        target: "${API_URL:-http://localhost:8080}/metrics"
        assertions:
          - status_code: 200
          - content_type: "text/plain"

  - id: "api-rate-limit"
    name: "Rate Limiting"
    description: "Test rate limiting enforcement"
    platform: api
    priority: medium
    steps:
      - action: http_get
        target: "${API_URL:-http://localhost:8080}/api/v1/health"
        repeat: 150
        assertions:
          - at_least_one:
              status_code: 429
