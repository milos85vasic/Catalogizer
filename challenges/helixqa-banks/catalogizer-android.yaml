name: "Catalogizer Android Test Suite"
description: "Comprehensive testing for Android applications"
version: "1.0.0"
platforms:
  - android

tests:
  - id: "android-app-launch"
    name: "Application Launch"
    description: "Verify Android app starts correctly"
    platform: android
    priority: critical
    steps:
      - action: launch_app
        package: "com.catalogizer.android"
        activity: ".MainActivity"
        assertions:
          - app_running: true
          - screen_visible: true
          - startup_time_ms: < 5000

  - id: "android-ui-render"
    name: "UI Rendering"
    description: "Verify main UI renders"
    platform: android
    priority: critical
    steps:
      - action: wait
        duration: 2000
        assertions:
          - element_exists: "com.catalogizer.android:id/main_container"
          - no_crash_dialog: true

  - id: "android-navigation-drawer"
    name: "Navigation Drawer"
    description: "Test navigation drawer"
    platform: android
    priority: high
    steps:
      - action: swipe
        direction: right
        start_x: 0
        start_y: 500
        assertions:
          - element_visible: "com.catalogizer.android:id/nav_drawer"

  - id: "android-browse-media"
    name: "Media Browsing"
    description: "Test media browsing functionality"
    platform: android
    priority: high
    steps:
      - action: tap
        target: "com.catalogizer.android:id/nav_browse"
      - action: wait
        duration: 1000
        assertions:
          - element_exists: "com.catalogizer.android:id/media_list"
          - adapter_count: "> 0"

  - id: "android-search"
    name: "Search Functionality"
    description: "Test search feature"
    platform: android
    priority: high
    steps:
      - action: tap
        target: "com.catalogizer.android:id/search_icon"
      - action: input
        target: "android:id/search_src_text"
        value: "test"
      - action: wait
        duration: 1000
        assertions:
          - element_exists: "com.catalogizer.android:id/search_results"

  - id: "android-settings"
    name: "Settings Screen"
    description: "Verify settings screen"
    platform: android
    priority: medium
    steps:
      - action: swipe
        direction: right
      - action: tap
        target: "com.catalogizer.android:id/nav_settings"
        assertions:
          - element_exists: "com.catalogizer.android:id/settings_list"

  - id: "android-offline-mode"
    name: "Offline Handling"
    description: "Test offline functionality"
    platform: android
    priority: medium
    steps:
      - action: disable_network
      - action: wait
        duration: 1000
        assertions:
          - element_visible: "com.catalogizer.android:id/offline_indicator"
      - action: enable_network

  - id: "android-rotation"
    name: "Screen Rotation"
    description: "Test orientation change"
    platform: android
    priority: low
    steps:
      - action: rotate
        orientation: landscape
      - action: wait
        duration: 500
        assertions:
          - no_crash_dialog: true
          - activity_recreated: true
      - action: rotate
        orientation: portrait

  - id: "androidtv-app-launch"
    name: "Android TV Launch"
    description: "Verify Android TV app starts"
    platform: android
    device_type: tv
    priority: critical
    steps:
      - action: launch_app
        package: "com.catalogizer.androidtv"
        activity: ".MainActivity"
        assertions:
          - app_running: true
          - leanback_ui: true

  - id: "androidtv-dpad-navigation"
    name: "D-Pad Navigation"
    description: "Test TV navigation"
    platform: android
    device_type: tv
    priority: high
    steps:
      - action: press_key
        key: DPAD_DOWN
      - action: wait
        duration: 200
      - action: press_key
        key: DPAD_DOWN
        assertions:
          - focus_changed: true
