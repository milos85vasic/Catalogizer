name: "Catalogizer Full Integration Test"
description: "Complete end-to-end test suite for all Catalogizer components"
version: "1.0.0"

import:
  - "./catalogizer-api.yaml"
  - "./catalogizer-web.yaml"
  - "./catalogizer-desktop.yaml"
  - "./catalogizer-android.yaml"

tests:
  - id: "integration-api-to-web"
    name: "API-Web Integration"
    description: "Verify web app communicates with API correctly"
    platform: web
    priority: critical
    dependencies: ["api-health-check"]
    steps:
      - action: http_post
        target: "${API_URL:-http://localhost:8080}/api/v1/auth/login"
        body:
          username: "admin"
          password: "${ADMIN_PASSWORD:-admin123}"
        save_response:
          api_token: "$.token"
      - action: navigate
        target: "${WEB_URL:-http://localhost:3000}/login"
      - action: input
        target: "#username"
        value: "admin"
      - action: input
        target: "#password"
        value: "${ADMIN_PASSWORD:-admin123}"
      - action: click
        target: "[data-testid='login-button']"
      - action: wait
        duration: 2000
        assertions:
          - url_contains: "/dashboard"
          - local_storage:
              key: "auth_token"
              not_empty: true

  - id: "integration-websocket-realtime"
    name: "WebSocket Real-time Updates"
    description: "Verify real-time updates flow through system"
    platform: api
    priority: high
    steps:
      - action: websocket_connect
        target: "ws://localhost:8080/ws"
        save_response:
          ws_client: "$.client_id"
      - action: http_post
        target: "${API_URL:-http://localhost:8080}/api/v1/events/trigger"
        headers:
          Authorization: "Bearer ${api_token}"
        body:
          type: "test_event"
          data: "integration_test"
      - action: websocket_wait
        timeout_ms: 5000
        assertions:
          - message_received: true
          - json_path: "$.type"
            expected: "test_event"

  - id: "integration-crud-operations"
    name: "Full CRUD Cycle"
    description: "Test create, read, update, delete operations"
    platform: api
    priority: high
    steps:
      - action: http_post
        target: "${API_URL:-http://localhost:8080}/api/v1/collections"
        headers:
          Authorization: "Bearer ${api_token}"
        body:
          name: "Test Collection ${timestamp}"
          description: "Created by HelixQA"
        save_response:
          collection_id: "$.id"
        assertions:
          - status_code: 201
      - action: http_get
        target: "${API_URL:-http://localhost:8080}/api/v1/collections/${collection_id}"
        headers:
          Authorization: "Bearer ${api_token}"
        assertions:
          - status_code: 200
          - json_path: "$.name"
            contains: "Test Collection"
      - action: http_put
        target: "${API_URL:-http://localhost:8080}/api/v1/collections/${collection_id}"
        headers:
          Authorization: "Bearer ${api_token}"
        body:
          name: "Updated Test Collection"
        assertions:
          - status_code: 200
      - action: http_delete
        target: "${API_URL:-http://localhost:8080}/api/v1/collections/${collection_id}"
        headers:
          Authorization: "Bearer ${api_token}"
        assertions:
          - status_code: 204

  - id: "integration-desktop-api"
    name: "Desktop-API Integration"
    description: "Verify desktop app uses API correctly"
    platform: desktop
    priority: high
    steps:
      - action: launch_app
        target: "catalogizer-desktop"
      - action: wait
        duration: 3000
        assertions:
          - api_connected: true
          - storage_roots_loaded: true
