input {
  beats {
    port => 5044
  }
  
  http {
    port => 8080
    codec => json
  }
  
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  if [fields][service] == "catalogizer-api" {
    mutate {
      add_field => { "service_name" => "catalogizer-api" }
    }
  }
  
  if [fields][service] == "catalogizer-web" {
    mutate {
      add_field => { "service_name" => "catalogizer-web" }
    }
  }
  
  # Parse timestamp
  date {
    match => [ "timestamp", "ISO8601" ]
  }
  
  # Add environment tag
  mutate {
    add_field => { "environment" => "development" }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "logstash-catalogizer-%{+YYYY.MM.dd}"
  }
  
  stdout {
    codec => rubydebug
  }
}